
services:
  app:
    container_name: bebe-app
    image: linaida/symfony:8.5
    ports:
      - "8000:8000"
    environment:
      # You should definitely change the password in production
      DATABASE_URL: "postgresql://bebe:bebe@database:5432/bebe?serverVersion=16"
      MAILER_DSN: "smtp://mailer:1025"
    volumes:
      - .:/app
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: bebe-database
    environment:
      POSTGRES_DB: bebe
      # You should definitely change the password in production
      POSTGRES_PASSWORD: bebe
      POSTGRES_USER: bebe
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-bebe}", "-U", "${POSTGRES_USER:-bebe}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###
###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    container_name: bebe-mailer
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
